<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Impostor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top-bar">
    <span id="guest-name" class="guest-name"></span>
    <div class="top-bar-right">
      <button class="signin-btn" onclick="showScreen('screen-signup')">Sign In</button>
      <button class="signin-btn" onclick="showScreen('screen-login')">Login</button>
    </div>
  </header>

  <!-- LANDING -->
  <div id="screen-landing" class="screen active">
    <h1 class="title">IMPOSTOR</h1>
    <div class="btn-group">
      <button onclick="showScreen('screen-solo')">Single Player</button>
      <button onclick="showScreen('screen-name', 'start')">Start Game</button>
      <button onclick="showScreen('screen-name', 'join')">Join Game</button>
    </div>
  </div>

  <!-- SINGLE PLAYER -->
  <div id="screen-solo" class="screen">
    <h2>Single Player</h2>
    <div class="solo-difficulty">
      <button class="difficulty-btn active" id="diff-easy" onclick="setDifficulty('easy')">Easy</button>
      <button class="difficulty-btn" id="diff-medium" onclick="setDifficulty('medium')">Medium</button>
      <button class="difficulty-btn" id="diff-hard" onclick="setDifficulty('hard')">Hard</button>
    </div>
    <div class="solo-settings">
      <div class="solo-setting-row">
        <span>Players:</span>
        <button onclick="changeSoloSetting('players', -1)">&#8722;</button>
        <span id="solo-player-count">5</span>
        <button onclick="changeSoloSetting('players', 1)">&#43;</button>
      </div>
      <div class="solo-setting-row">
        <span>Impostors:</span>
        <button onclick="changeSoloSetting('impostors', -1)">&#8722;</button>
        <span id="solo-impostor-count">1</span>
        <button onclick="changeSoloSetting('impostors', 1)">&#43;</button>
      </div>
    </div>
    <button onclick="startSolo()">Play</button>
    <p class="error" id="err-solo"></p>
    <button class="back-btn" onclick="showScreen('screen-landing')">Back</button>
  </div>

  <!-- NAME INPUT -->
  <div id="screen-name" class="screen">
    <h2 id="name-heading"></h2>
    <input id="input-name" type="text" placeholder="Your name" maxlength="16" />
    <input id="input-code" type="text" placeholder="5-digit room code" maxlength="5" style="display:none" />
    <button id="btn-name-go" onclick="nameGo()">Continue</button>
    <p class="error" id="err-name"></p>
    <button class="back-btn" onclick="showScreen('screen-landing')">Back</button>
  </div>

  <!-- SIGN IN (create a permanent account) -->
  <div id="screen-signup" class="screen">
    <h2>Sign In</h2>
    <input id="input-signup-username" type="text" placeholder="Username" maxlength="20" />
    <input id="input-signup-password" type="password" placeholder="Password" maxlength="64" />
    <button onclick="doSignup()">Continue</button>
    <p class="error" id="err-signup"></p>
    <button class="back-btn" onclick="showScreen('screen-landing')">Back</button>
  </div>

  <!-- LOGIN (use an existing account on another device) -->
  <div id="screen-login" class="screen">
    <h2>Login</h2>
    <input id="input-login-username" type="text" placeholder="Username" maxlength="20" />
    <input id="input-login-password" type="password" placeholder="Password" maxlength="64" />
    <button onclick="doLogin()">Continue</button>
    <p class="error" id="err-login"></p>
    <button class="back-btn" onclick="showScreen('screen-landing')">Back</button>
  </div>

  <!-- LOBBY -->
  <div id="screen-lobby" class="screen">
    <h2>Waiting Room</h2>
    <div class="code-box">Room Code: <span id="lobby-code"></span></div>
    <ul id="lobby-players" class="player-list"></ul>

    <div id="impostor-control-host" class="impostor-control" style="display:none">
      <span>Impostors:</span>
      <button onclick="changeImpostorCount(-1)">-</button>
      <span id="impostor-count-value">1</span>
      <button onclick="changeImpostorCount(1)">+</button>
    </div>
    <p id="impostor-count-readonly" class="impostor-control" style="display:none"></p>

    <p id="lobby-host-note"></p>
    <button id="btn-start" onclick="startGame()" style="display:none">Start Game</button>
    <p class="error" id="err-lobby"></p>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <h2 id="game-role-title"></h2>
    <div id="game-word-box" class="word-box"></div>
    <p id="game-hint"></p>

    <div id="guess-area" style="display:none">
      <input id="input-guess" type="text" placeholder="Guess the word" maxlength="20" />
      <button onclick="submitGuess()">Submit Guess</button>
      <p class="error" id="guess-status"></p>
    </div>

    <div id="clue-area" class="clue-area">
      <div class="clue-status-row">
        <h3 id="clue-turn-label"></h3>
        <span id="clue-timer" class="clue-timer"></span>
      </div>
      <div id="clue-input-row" class="clue-input-row" style="display:none">
        <input id="input-clue" type="text" placeholder="A word related to it..." maxlength="30" />
        <button onclick="submitClue()">Submit</button>
      </div>
      <ul id="clue-list" class="player-list"></ul>
    </div>

    <button id="btn-call-vote" onclick="callVote()" style="display:none">Call Vote</button>
  </div>

  <!-- VOTE -->
  <div id="screen-vote" class="screen">
    <h2>Time to Vote</h2>
    <ul id="vote-players" class="player-list"></ul>
    <button class="skip-btn" onclick="castVote('skip')">Skip Vote</button>
    <p id="vote-status"></p>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <h2 id="result-title"></h2>
    <p id="result-detail"></p>
    <button id="btn-result-continue" onclick="continueAfterVote()">Continue</button>
  </div>

  <!-- CHAT (persists across game/vote/result screens) -->
  <div id="chat-panel" class="chat-panel" style="display:none">
    <div class="chat-header">
      <span class="chat-title">Chat</span>
      <button class="chat-minimize-btn" onclick="toggleChatMinimize()">&#8722;</button>
    </div>
    <div class="chat-body" id="chat-body">
    <div class="chat-tabs" id="chat-tabs">
      <button class="chat-tab active" data-tab="all" onclick="switchChatTab('all')">All</button>
      <button class="chat-tab" data-tab="impostor" id="chat-tab-impostor" style="display:none" onclick="switchChatTab('impostor')">Impostors</button>
    </div>
    <select id="dm-target-select" onchange="openDmFromSelect()">
      <option value="">Start a private chat...</option>
    </select>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-row">
      <input id="chat-input" type="text" placeholder="Type a message..." maxlength="200" />
      <button onclick="sendChatMessage()">Send</button>
    </div>
    <p class="error" id="chat-error"></p>
    </div>
  </div>

  <!-- GAME BROWSER (right side, visible on landing) -->
  <div id="game-browser" class="game-browser" style="display:none">
    <div class="game-browser-header">
      <span class="game-browser-title">&#127760; Live Games</span>
    </div>
    <div id="game-browser-list" class="game-browser-list">
      <p class="game-browser-empty">No active games.</p>
    </div>
    <p class="error" id="game-browser-error"></p>
  </div>

  <!-- SPECTATE -->
  <div id="screen-spectate" class="screen">
    <h2>Spectating</h2>
    <div class="word-box" id="spectate-word"></div>
    <p id="spectate-impostors"></p>
    <div class="clue-area">
      <div class="clue-status-row">
        <h3 id="spectate-turn-label"></h3>
        <span id="spectate-timer" class="clue-timer"></span>
      </div>
      <ul id="spectate-clue-list" class="player-list"></ul>
    </div>
    <p id="spectate-status"></p>
    <button onclick="stopSpectating()">Leave Game</button>
  </div>

  <!-- QR CODE (scan to open the game) -->
  <div id="qr-corner" class="qr-corner">
    <img id="qr-code" alt="Scan to play" />
    <span>Scan to play</span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
